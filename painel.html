<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel Invictus</title>
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#ff6600">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      background: linear-gradient(135deg, #f4f6f9, #e9eef3);
    }

    .container {
      max-width: 1200px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: #ffffff;
      border-radius: 20px;
      padding: 25px;
      margin-bottom: 25px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.08);
    }

    .titulo {
      color: #ff6600;
      margin-bottom: 20px;
      font-weight: 700;
    }

    .linha {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      background: #f8f9fb;
      margin-bottom: 8px;
      border-radius: 8px;
    }

    .status-pago { color: green; font-weight: bold; }
    .status-nao { color: red; font-weight: bold; }

    #contratos {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
    }

    /* TABELA BACKLOG */
    .tabela-backlog {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    .tabela-backlog th {
      background: #d1d5db;
      border: 2px solid #000;
      padding: 12px;
      text-align: center;
    }

    .tabela-backlog td {
      border: 1px solid #000;
      padding: 10px;
    }

    .tabela-backlog td:nth-child(2),
    .tabela-backlog td:nth-child(3) {
      text-align: right;
      font-weight: bold;
    }

    .tabela-backlog tfoot td {
      background: #d1d5db;
      border: 2px solid #000;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- RESUMO -->
  <div class="card">
    <h2 class="titulo">Resumo Geral</h2>
    <div id="resumo"></div>
    <canvas id="grafico"></canvas>
  </div>

  <!-- CONTRATOS -->
  <div id="contratos"></div>

  <!-- BACKLOG -->
  <div class="card">
    <h2 class="titulo">Backlog</h2>

    <table class="tabela-backlog">
      <thead>
        <tr>
          <th>EMPRESA</th>
          <th>FATURAMENTO MENSAL</th>
          <th>BACKLOG</th>
        </tr>
      </thead>

      <tbody>
        <tr><td>Copasa</td><td>R$ 0,00</td><td>R$ 0,00</td></tr>
        <tr><td>FUNAI</td><td>R$ 0,00</td><td>R$ 0,00</td></tr>
        <tr><td>SAMAE</td><td>R$ 0,00</td><td>R$ 0,00</td></tr>
        <tr><td>GHC</td><td>R$ 0,00</td><td>R$ 0,00</td></tr>
        <tr><td>IFPI</td><td>R$ 0,00</td><td>R$ 0,00</td></tr>
        <tr><td>IPEM</td><td>R$ 0,00</td><td>R$ 0,00</td></tr>
        <tr><td>ANVISA</td><td>R$ 0,00</td><td>R$ 0,00</td></tr>
        <tr><td>IFRO</td><td>R$ 0,00</td><td>R$ 0,00</td></tr>
        <tr><td>USP</td><td>R$ 0,00</td><td>R$ 0,00</td></tr>
      </tbody>

      <tfoot>
        <tr>
          <td>TOTAL</td>
          <td>R$ 0,00</td>
          <td>R$ 0,00</td>
        </tr>
      </tfoot>
    </table>

  </div>

</div>

<script>

// 🔐 PROTEÇÃO
if (localStorage.getItem("acesso") !== "ok") {
  window.location.href = "intranet.html";
}

// FORMATAÇÃO
function formatar(valor) {
  return valor.toLocaleString('pt-BR', {
    style: 'currency',
    currency: 'BRL'
  });
}

// DADOS
const dados = { ...SEU BLOCO ATUAL AQUI... };

const contratosDiv = document.getElementById("contratos");
const resumoDiv = document.getElementById("resumo");

let totalNota = 0;
let totalPago = 0;
let totalFolha = 0;
let totalBeneficios = 0;
let totalFgts = 0;

// CONTRATOS
for (let nome in dados) {
  let d = dados[nome];

  totalNota += d.nota;
  totalPago += d.pago;
  totalFolha += d.folha;
  totalBeneficios += d.beneficios;
  totalFgts += d.fgts;

  contratosDiv.innerHTML += `
    <div class="card">
      <h3 class="titulo">${nome}</h3>

      <div class="linha"><span>Nota</span><span>${formatar(d.nota)}</span></div>
      <div class="linha"><span>Pago</span><span>${formatar(d.pago)}</span></div>
      <div class="linha"><span>Folha</span><span>${formatar(d.folha)}</span></div>
      <div class="linha"><span>VA/VT</span><span>${formatar(d.beneficios)}</span></div>
      <div class="linha"><span>FGTS</span><span>${formatar(d.fgts)}</span></div>
    </div>
  `;
}

// RESUMO
resumoDiv.innerHTML = `
  <div class="linha"><strong>Total Notas</strong><span>${formatar(totalNota)}</span></div>
  <div class="linha"><strong>Total Recebido</strong><span>${formatar(totalPago)}</span></div>
  <div class="linha"><strong>Total Folha</strong><span>${formatar(totalFolha)}</span></div>
  <div class="linha"><strong>Total VA/VT</strong><span>${formatar(totalBeneficios)}</span></div>
  <div class="linha"><strong>Total FGTS</strong><span>${formatar(totalFgts)}</span></div>
`;

// GRÁFICO
new Chart(document.getElementById("grafico"), {
  type: 'bar',
  data: {
    labels: ['Notas', 'Recebido', 'Folha', 'VA/VT', 'FGTS'],
    datasets: [{
      label: 'Valores',
      data: [totalNota, totalPago, totalFolha, totalBeneficios, totalFgts]
    }]
  }
});

</script>

</body>
</html>
