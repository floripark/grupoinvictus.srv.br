<script>

// 🔐 PROTEÇÃO
if (localStorage.getItem("acesso") !== "ok") {
  window.location.href = "intranet.html";
}

// 💰 FORMATAÇÃO
function formatar(valor) {
  return valor.toLocaleString('pt-BR', {
    style: 'currency',
    currency: 'BRL'
  });
}

// 📊 DADOS
const dados = {
  "Copasa": {
    nota: 15000,
    paga: true,
    pago: 15000,
    folha: 8000,
    folhaPago: true,
    beneficios: 2000,
    beneficiosPago: false,
    fgts: 1200,
    fgtsPago: true
  },
  "GHC": {
    nota: 20000,
    paga: false,
    pago: 0,
    folha: 9000,
    folhaPago: false,
    beneficios: 2500,
    beneficiosPago: false,
    fgts: 1500,
    fgtsPago: false
  },
  "SAMAE": {
    nota: 20000,
    paga: false,
    pago: 0,
    folha: 9000,
    folhaPago: false,
    beneficios: 2500,
    beneficiosPago: false,
    fgts: 1500,
    fgtsPago: false
  }
};

const contratosDiv = document.getElementById("contratos");
const resumoDiv = document.getElementById("resumo");

// 🔢 TOTAIS
let totalNota = 0;
let totalPago = 0;
let totalFolha = 0;
let totalBeneficios = 0;
let totalFgts = 0;

// 📌 CONTRATOS
for (let nome in dados) {
  let d = dados[nome];

  totalNota += d.nota;
  totalPago += d.pago;
  totalFolha += d.folha;
  totalBeneficios += d.beneficios;
  totalFgts += d.fgts;

  contratosDiv.innerHTML += `
    <div class="card">
      <h3 class="titulo">${nome}</h3>

      <div class="linha">
        <span>Nota:</span>
        <span>${formatar(d.nota)} (${d.paga ? '<span class="status-pago">Paga</span>' : '<span class="status-nao">Não paga</span>'})</span>
      </div>

      <div class="linha">
        <span>Valor Pago:</span>
        <span>${formatar(d.pago)}</span>
      </div>

      <div class="linha">
        <span>Folha:</span>
        <span>${formatar(d.folha)} (${d.folhaPago ? 'Pago' : 'Pendente'})</span>
      </div>

      <div class="linha">
        <span>VA/VT:</span>
        <span>${formatar(d.beneficios)} (${d.beneficiosPago ? 'Pago' : 'Pendente'})</span>
      </div>

      <div class="linha">
        <span>FGTS:</span>
        <span>${formatar(d.fgts)} (${d.fgtsPago ? 'Pago' : 'Pendente'})</span>
      </div>
    </div>
  `;
}

// 📊 RESUMO
resumoDiv.innerHTML = `
  <div class="linha"><strong>Total Notas:</strong><span>${formatar(totalNota)}</span></div>
  <div class="linha"><strong>Total Recebido:</strong><span>${formatar(totalPago)}</span></div>
  <div class="linha"><strong>Total Folha:</strong><span>${formatar(totalFolha)}</span></div>
  <div class="linha"><strong>Total VA/VT:</strong><span>${formatar(totalBeneficios)}</span></div>
  <div class="linha"><strong>Total FGTS:</strong><span>${formatar(totalFgts)}</span></div>
`;

// 📈 GRÁFICO
new Chart(document.getElementById("grafico"), {
  type: 'bar',
  data: {
    labels: ['Notas', 'Recebido', 'Folha', 'VA/VT', 'FGTS'],
    datasets: [{
      label: 'Valores',
      data: [totalNota, totalPago, totalFolha, totalBeneficios, totalFgts]
    }]
  }
});

</script>
