<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel Invictus</title>
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#ff6600">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>

  <style>
  body {
    background: linear-gradient(135deg, #f4f6f9, #e9eef3);
  }
    .tabela-wrapper {
  max-width: 500px;
  margin: 0 auto;
  overflow-x: auto;
  border-radius: 18px;
}

.tabela-backlog {
  width: 100%;
  border-collapse: collapse;
  background: #ffffff;
  border-radius: 18px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

.tabela-backlog thead {
  background: linear-gradient(135deg, #ff6600, #ff8533);
}

.tabela-backlog thead th {
  color: white;
  text-align: left;
  padding: 16px 18px;
  font-size: 14px;
  letter-spacing: 0.3px;
}

.tabela-backlog tbody tr {
  border-bottom: 1px solid #f1f1f1;
  transition: background 0.2s ease;
}

.tabela-backlog tbody tr:nth-child(even) {
  background: #fafafa;
}

.tabela-backlog tbody tr:hover {
  background: #fff3e6;
}

.tabela-backlog td {
  padding: 14px 18px;
  font-size: 15px;
  color: #333;
}

.tabela-backlog tfoot tr {
  background: #fff3e6;
  border-top: 2px solid #ff6600;
}

.tabela-backlog tfoot td {
  padding: 16px 18px;
  font-size: 16px;
  font-weight: 700;
  color: #222;
}

  .container {
    max-width: 1200px;
    margin: auto;
    padding: 20px;
  }

  .card {
    background: #ffffff;
    border-radius: 20px;
    padding: 25px;
    margin-bottom: 25px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.08);
    transition: 0.3s;
  }

  .card:hover {
    transform: translateY(-5px);
  }

  .titulo {
    color: #ff6600;
    margin-bottom: 20px;
    font-weight: 700;
    font-size: 20px;
  }

  .linha {
    display: flex;
    justify-content: space-between;
    margin: 10px 0;
    padding: 10px;
    border-radius: 10px;
    background: #f8f9fb;
  }

  .linha span:last-child {
    font-weight: 600;
  }

  .status-pago {
    color: #0bbf6a;
    font-weight: bold;
  }

  .status-nao {
    color: #ff3b3b;
    font-weight: bold;
  }

  #resumo .linha {
    background: #fff3e6;
    border-left: 5px solid #ff6600;
  }

  #contratos {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 20px;
  }

  canvas {
    margin-top: 20px;
  }
</style>
</head>

<body>

<div class="container">

  <div class="card">
    <h2 class="titulo">Resumo Geral</h2>
    <div id="resumo"></div>
   <div style="max-width: 500px; margin: auto;">
  <canvas id="grafico"></canvas>
</div>

  <div id="contratos"></div>

</div>

<script>

// 🔐 PROTEÇÃO
if (localStorage.getItem("acesso") !== "ok") {
  window.location.href = "intranet.html";
}

// 💰 FUNÇÃO DE FORMATAÇÃO
function formatar(valor) {
  return valor.toLocaleString('pt-BR', {
    style: 'currency',
    currency: 'BRL'
  });
}

// 📊 DADOS
const dados = {
  "Copasa": {
    nota: 15000, paga: true, pago: 15000,
    folha: 8000, folhaPago: true,
    beneficios: 2000, beneficiosPago: false,
    fgts: 1200, fgtsPago: true
  },

  "GHC": {
    nota: 158000, paga: true, pago: 118000,
    folha: 78765, folhaPago: true,
    beneficios: 20000, beneficiosPago: true,
    fgts: 9347, fgtsPago: true
  },

  "SAMAE": {
    nota: 20000, paga: false, pago: 0,
    folha: 9000, folhaPago: false,
    beneficios: 2500, beneficiosPago: false,
    fgts: 1500, fgtsPago: false
  },

  "Funai Norte Limpeza": {
    nota: 18000, paga: true, pago: 18000,
    folha: 7000, folhaPago: true,
    beneficios: 2200, beneficiosPago: false,
    fgts: 1300, fgtsPago: true
  },

  "Funai Norte Adm": {
    nota: 12000, paga: false, pago: 0,
    folha: 5000, folhaPago: false,
    beneficios: 1500, beneficiosPago: false,
    fgts: 900, fgtsPago: false
  },

  "Funai Xingu": {
    nota: 14000, paga: true, pago: 14000,
    folha: 6000, folhaPago: true,
    beneficios: 1800, beneficiosPago: true,
    fgts: 1000, fgtsPago: true
  },

  "Funai Médio Purus": {
    nota: 16000, paga: false, pago: 0,
    folha: 6500, folhaPago: false,
    beneficios: 2000, beneficiosPago: false,
    fgts: 1100, fgtsPago: false
  },

  "Funai Alto Purus": {
    nota: 17000, paga: true, pago: 17000,
    folha: 7500, folhaPago: true,
    beneficios: 2100, beneficiosPago: true,
    fgts: 1200, fgtsPago: true
  },

  "FUNAI DOURADOS": {
    nota: 0, paga: false, pago: 0,
    folha: 0, folhaPago: false,
    beneficios: 0, beneficiosPago: false,
    fgts: 0, fgtsPago: false
  },

  "FUNAI JURUÁ": {
    nota: 0, paga: false, pago: 0,
    folha: 0, folhaPago: false,
    beneficios: 0, beneficiosPago: false,
    fgts: 0, fgtsPago: false
  },

  "FUNAI RIO NEGRO": {
    nota: 0, paga: false, pago: 0,
    folha: 0, folhaPago: false,
    beneficios: 0, beneficiosPago: false,
    fgts: 0, fgtsPago: false
  },

  "FUNAI PARANÁ": {
    nota: 0, paga: false, pago: 0,
    folha: 0, folhaPago: false,
    beneficios: 0, beneficiosPago: false,
    fgts: 0, fgtsPago: false
  },

  "IFPI PIO IX": {
    nota: 0, paga: false, pago: 0,
    folha: 0, folhaPago: false,
    beneficios: 0, beneficiosPago: false,
    fgts: 0, fgtsPago: false
  },

  "IFIP OEIRAS": {
    nota: 0, paga: false, pago: 0,
    folha: 0, folhaPago: false,
    beneficios: 0, beneficiosPago: false,
    fgts: 0, fgtsPago: false
  }
};

const contratosDiv = document.getElementById("contratos");
const resumoDiv = document.getElementById("resumo");

// TOTAIS
let totalNota = 0;
let totalPago = 0;
let totalFolha = 0;
let totalBeneficios = 0;
let totalFgts = 0;

// CONTRATOS
for (let nome in dados) {
  let d = dados[nome];

  totalNota += d.nota;
  totalPago += d.pago;
  totalFolha += d.folha;
  totalBeneficios += d.beneficios;
  totalFgts += d.fgts;

  contratosDiv.innerHTML += `
    <div class="card">
      <h3 class="titulo">${nome}</h3>

      <div class="linha">
        <span>Nota:</span>
        <span>${formatar(d.nota)} (${d.paga ? '<span class="status-pago">Paga</span>' : '<span class="status-nao">Não paga</span>'})</span>
      </div>

      <div class="linha"><span>Valor Pago:</span><span>${formatar(d.pago)}</span></div>

      <div class="linha">
        <span>Folha:</span>
        <span>${formatar(d.folha)} (${d.folhaPago ? '<span class="status-pago">Pago</span>' : '<span class="status-nao">Pendente</span>'})</span>
      </div>

      <div class="linha">
        <span>VA/VT:</span>
        <span>${formatar(d.beneficios)} (${d.beneficiosPago ? '<span class="status-pago">Pago</span>' : '<span class="status-nao">Pendente</span>'})</span>
      </div>

      <div class="linha">
        <span>FGTS:</span>
        <span>${formatar(d.fgts)} (${d.fgtsPago ? '<span class="status-pago">Pago</span>' : '<span class="status-nao">Pendente</span>'})</span>
      </div>
    </div>
  `;
}

// RESUMO
resumoDiv.innerHTML = `
  <div class="linha"><strong>Total Notas:</strong><span>${formatar(totalNota)}</span></div>
  <div class="linha"><strong>Total Recebido:</strong><span>${formatar(totalPago)}</span></div>
  <div class="linha"><strong>Total Folha:</strong><span>${formatar(totalFolha)}</span></div>
  <div class="linha"><strong>Total VA/VT:</strong><span>${formatar(totalBeneficios)}</span></div>
  <div class="linha"><strong>Total FGTS:</strong><span>${formatar(totalFgts)}</span></div>
`;

// GRÁFICO
new Chart(document.getElementById("grafico"), {
  type: 'bar',
  data: {
    labels: ['Notas', 'Recebido', 'Folha', 'VA/VT', 'FGTS'],
    datasets: [{
      label: 'Valores (R$)',
      data: [totalNota, totalPago, totalFolha, totalBeneficios, totalFgts],
      backgroundColor: [
        '#ff6600',
        '#0bbf6a',
        '#3b82f6',
        '#a855f7',
        '#f43f5e'
      ],
      borderRadius: 10
    }]
  },
  options: {
    plugins: {
      legend: {
        display: false
      },

      // 🔥 AQUI É O SEGREDO
      datalabels: {
        anchor: 'end',
        align: 'top',
        color: '#333',
        font: {
          weight: 'bold',
          size: 12
        },
        formatter: function(value) {
          return 'R$ ' + value.toLocaleString('pt-BR');
        }
      },

      tooltip: {
        callbacks: {
          label: function(context) {
            return 'R$ ' + context.raw.toLocaleString('pt-BR');
          }
        }
      }
    },

    scales: {
      y: {
        beginAtZero: true,
        ticks: {
          callback: function(value) {
            return 'R$ ' + value.toLocaleString('pt-BR');
          }
        }
      }
    }
  },

  plugins: [ChartDataLabels] // 🔥 IMPORTANTE
});
</script>

 <div class="container">
  <div class="card">
    <h2 class="titulo">Backlog</h2>

    <div class="tabela-wrapper">
      <table class="tabela-backlog">
        <thead>
          <tr>
            <th>Empresa</th>
            <th>Faturamento Mensal</th>
            <th>Backlog</th>
          </tr>
        </thead>

        <tbody>
          <tr><td>Copasa</td><td>R$ 0,00</td><td>R$ 0,00</td></tr>
          <tr><td>FUNAI</td><td>R$ 0,00</td><td>R$ 0,00</td></tr>
          <tr><td>SAMAE</td><td>R$ 0,00</td><td>R$ 0,00</td></tr>
          <tr><td>GHC</td><td>R$ 0,00</td><td>R$ 0,00</td></tr>
          <tr><td>IFPI</td><td>R$ 0,00</td><td>R$ 0,00</td></tr>
          <tr><td>IPEM</td><td>R$ 0,00</td><td>R$ 0,00</td></tr>
          <tr><td>ANVISA</td><td>R$ 0,00</td><td>R$ 0,00</td></tr>
          <tr><td>IFRO</td><td>R$ 0,00</td><td>R$ 0,00</td></tr>
          <tr><td>USP</td><td>R$ 0,00</td><td>R$ 0,00</td></tr>
        </tbody>

        <tfoot>
          <tr>
            <td>Total</td>
            <td>R$ 0,00</td>
            <td>R$ 0,00</td>
          </tr>
        </tfoot>
      </table>
    </div>
  </div>
</div>
  
</body>
</html>
