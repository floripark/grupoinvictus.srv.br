<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel Invictus</title>
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#ff6600">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>

  <style>
  body {
    background: linear-gradient(135deg, #f4f6f9, #e9eef3);
  }
    .tabela-wrapper {
  max-width: 500px;
  margin: 0 auto;
  overflow-x: auto;
  border-radius: 18px;
}

.tabela-backlog {
  width: 100%;
  border-collapse: collapse;
  background: #ffffff;
  border-radius: 18px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

.tabela-backlog thead {
  background: linear-gradient(135deg, #ff6600, #ff8533);
}

.tabela-backlog thead th {
  color: white;
  text-align: left;
  padding: 16px 18px;
  font-size: 14px;
  letter-spacing: 0.3px;
}

.tabela-backlog tbody tr {
  border-bottom: 1px solid #f1f1f1;
  transition: background 0.2s ease;
}

.tabela-backlog tbody tr:nth-child(even) {
  background: #fafafa;
}

.tabela-backlog tbody tr:hover {
  background: #fff3e6;
}

.tabela-backlog td {
  padding: 8px 12px;
  font-size: 15px;
  color: #333;
}

.tabela-backlog tfoot tr {
  background: #fff3e6;
  border-top: 2px solid #ff6600;
}

.tabela-backlog tfoot td {
  padding: 16px 18px;
  font-size: 16px;
  font-weight: 700;
  color: #222;
}

  .container {
    max-width: 1200px;
    margin: auto;
    padding: 20px;
  }

  .card {
    background: #ffffff;
    border-radius: 20px;
    padding: 25px;
    margin-bottom: 25px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.08);
    transition: 0.3s;
  }

  .card:hover {
    transform: translateY(-5px);
  }

  .titulo {
    color: #ff6600;
    margin-bottom: 20px;
    font-weight: 700;
    font-size: 20px;
  }

  .linha {
    display: flex;
    justify-content: space-between;
    margin: 10px 0;
    padding: 10px;
    border-radius: 10px;
    background: #f8f9fb;
  }

  .linha span:last-child {
    font-weight: 600;
  }

  .status-pago {
    color: #0bbf6a;
    font-weight: bold;
  }

  .status-nao {
    color: #ff3b3b;
    font-weight: bold;
  }

  #resumo .linha {
    background: #fff3e6;
    border-left: 5px solid #ff6600;
  }

  #contratos {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 20px;
  }

  canvas {
    margin-top: 20px;
  }
</style>
</head>

<body>

<div class="container">

  <div class="card">
    <h2 class="titulo">Resumo Geral</h2>
    <div id="resumo"></div>
   <div style="max-width: 500px; margin: auto;">
  <canvas id="grafico"></canvas>
</div>

  <div id="contratos"></div>

</div>

<script>

// 🔐 PROTEÇÃO
if (localStorage.getItem("acesso") !== "ok") {
  window.location.href = "intranet.html";
}

// 💰 FUNÇÃO DE FORMATAÇÃO
function formatar(valor) {
  return valor.toLocaleString('pt-BR', {
    style: 'currency',
    currency: 'BRL'
  });
}

// 📊 DADOS
const dados = {
  "Copasa": {
    nota: 15000, paga: true, pago: 15000,
    folha: 8000, folhaPago: true,
    beneficios: 2000, beneficiosPago: false,
    fgts: 1200, fgtsPago: true
  },

  "GHC": {
    nota: 158000, paga: true, pago: 118000,
    folha: 78765, folhaPago: true,
    beneficios: 20000, beneficiosPago: true,
    fgts: 9347, fgtsPago: true
  },

  "SAMAE": {
    nota: 20000, paga: false, pago: 0,
    folha: 9000, folhaPago: false,
    beneficios: 2500, beneficiosPago: false,
    fgts: 1500, fgtsPago: false
  }
};

const contratosDiv = document.getElementById("contratos");
const resumoDiv = document.getElementById("resumo");

// TOTAIS
let totalNota = 0;
let totalPago = 0;
let totalFolha = 0;
let totalBeneficios = 0;
let totalFgts = 0;
let totalResultado = 0;

// CONTRATOS
for (let nome in dados) {
  let d = dados[nome];

  let resultado = d.pago - (d.folha + d.beneficios + d.fgts);
  totalResultado += resultado;

  totalNota += d.nota;
  totalPago += d.pago;
  totalFolha += d.folha;
  totalBeneficios += d.beneficios;
  totalFgts += d.fgts;

  contratosDiv.innerHTML += `
    <div class="card">
      <h3 class="titulo">${nome}</h3>

      <div class="linha"><span>Nota:</span><span>${formatar(d.nota)}</span></div>
      <div class="linha"><span>Valor Pago:</span><span>${formatar(d.pago)}</span></div>
      <div class="linha"><span>Folha:</span><span>${formatar(d.folha)}</span></div>
      <div class="linha"><span>VA/VT:</span><span>${formatar(d.beneficios)}</span></div>
      <div class="linha"><span>FGTS:</span><span>${formatar(d.fgts)}</span></div>

      <div class="linha">
        <span><strong>Resultado:</strong></span>
        <span style="color:${resultado >= 0 ? '#0bbf6a' : '#ff3b3b'}">
          ${formatar(resultado)}
        </span>
      </div>
    </div>
  `;
}

// RESUMO
resumoDiv.innerHTML = `
  <div class="linha"><strong>Total Notas:</strong><span>${formatar(totalNota)}</span></div>
  <div class="linha"><strong>Total Recebido:</strong><span>${formatar(totalPago)}</span></div>
  <div class="linha"><strong>Total Folha:</strong><span>${formatar(totalFolha)}</span></div>
  <div class="linha"><strong>Total VA/VT:</strong><span>${formatar(totalBeneficios)}</span></div>
  <div class="linha"><strong>Total FGTS:</strong><span>${formatar(totalFgts)}</span></div>

  <div class="linha">
    <strong>Resultado:</strong>
    <span style="color:${totalResultado >= 0 ? '#0bbf6a' : '#ff3b3b'}">
      ${formatar(totalResultado)}
    </span>
  </div>
`;

// GRÁFICO
new Chart(document.getElementById("grafico"), {
  type: 'bar',
  data: {
    labels: ['Notas','Recebido','Folha','VA/VT','FGTS','Resultado'],
    datasets: [{
      data: [totalNota,totalPago,totalFolha,totalBeneficios,totalFgts,totalResultado],
      backgroundColor: [
        '#ff6600','#0bbf6a','#3b82f6','#a855f7','#f43f5e',
        totalResultado >= 0 ? '#0bbf6a' : '#ff3b3b'
      ],
      borderRadius: 10
    }]
  },
  options: {
    plugins: {
      legend: { display: false },
      datalabels: {
        anchor: 'end',
        align: 'top',
        formatter: v => 'R$ ' + v.toLocaleString('pt-BR')
      }
    }
  },
  plugins: [ChartDataLabels]
});
</script>

</body>
</html>
