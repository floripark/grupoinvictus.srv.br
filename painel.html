<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel Invictus</title>
  <link rel="stylesheet" href="style.css">

  <!-- GRÁFICO -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      background: #f4f6f9;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    .titulo {
      color: #ff6600;
      margin-bottom: 15px;
      font-weight: 700;
    }

    .linha {
      display: flex;
      justify-content: space-between;
      margin: 8px 0;
    }

    .status-pago {
      color: green;
      font-weight: bold;
    }

    .status-nao {
      color: red;
      font-weight: bold;
    }

    canvas {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="card">
    <h2 class="titulo">Resumo Geral</h2>
    <div id="resumo"></div>
    <canvas id="grafico"></canvas>
  </div>

  <div id="contratos"></div>

</div>

<script>

// 🔐 PROTEÇÃO
if (localStorage.getItem("acesso") !== "ok") {
  window.location.href = "intranet.html";
}

// 📊 DADOS (EDITÁVEL)
const dados = {
  "Copasa": {
    nota: 15000,
    paga: true,
    pago: 15000,
    folha: 8000,
    folhaPago: true,
    beneficios: 2000,
    beneficiosPago: false,
    fgts: 1200,
    fgtsPago: true
  },
  "GHC": {
    nota: 20000,
    paga: false,
    pago: 0,
    folha: 9000,
    folhaPago: false,
    beneficios: 2500,
    beneficiosPago: false,
    fgts: 1500,
    fgtsPago: false
  }
};

const contratosDiv = document.getElementById("contratos");
const resumoDiv = document.getElementById("resumo");

// TOTAIS
let totalNota = 0;
let totalPago = 0;
let totalFolha = 0;
let totalBeneficios = 0;
let totalFgts = 0;

// CONTRATOS
for (let nome in dados) {
  let d = dados[nome];

  totalNota += d.nota;
  totalPago += d.pago;
  totalFolha += d.folha;
  totalBeneficios += d.beneficios;
  totalFgts += d.fgts;

  contratosDiv.innerHTML += `
    <div class="card">
      <h3 class="titulo">${nome}</h3>

      <div class="linha">
        <span>Nota:</span>
        <span>R$ ${d.nota} (${d.paga ? '<span class="status-pago">Paga</span>' : '<span class="status-nao">Não paga</span>'})</span>
      </div>

      <div class="linha"><span>Valor Pago:</span><span>R$ ${d.pago}</span></div>

      <div class="linha">
        <span>Folha:</span>
        <span>R$ ${d.folha} (${d.folhaPago ? '<span class="status-pago">Pago</span>' : '<span class="status-nao">Pendente</span>'})</span>
      </div>

      <div class="linha">
        <span>VA/VT:</span>
        <span>R$ ${d.beneficios} (${d.beneficiosPago ? '<span class="status-pago">Pago</span>' : '<span class="status-nao">Pendente</span>'})</span>
      </div>

      <div class="linha">
        <span>FGTS:</span>
        <span>R$ ${d.fgts} (${d.fgtsPago ? '<span class="status-pago">Pago</span>' : '<span class="status-nao">Pendente</span>'})</span>
      </div>
    </div>
  `;
}

// RESUMO
resumoDiv.innerHTML = `
  <div class="linha"><strong>Total Notas:</strong><span>R$ ${totalNota}</span></div>
  <div class="linha"><strong>Total Recebido:</strong><span>R$ ${totalPago}</span></div>
  <div class="linha"><strong>Total Folha:</strong><span>R$ ${totalFolha}</span></div>
  <div class="linha"><strong>Total VA/VT:</strong><span>R$ ${totalBeneficios}</span></div>
  <div class="linha"><strong>Total FGTS:</strong><span>R$ ${totalFgts}</span></div>
`;

// GRÁFICO
new Chart(document.getElementById("grafico"), {
  type: 'bar',
  data: {
    labels: ['Notas', 'Recebido', 'Folha', 'VA/VT', 'FGTS'],
    datasets: [{
      label: 'Valores',
      data: [totalNota, totalPago, totalFolha, totalBeneficios, totalFgts]
    }]
  }
});

</script>

</body>
</html>
