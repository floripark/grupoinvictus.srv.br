<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel Invictus</title>
  <link rel="stylesheet" href="style.css">

  <style>
    .contrato {
      max-width: 800px;
      margin: 20px auto;
      padding: 20px;
      border-radius: 15px;
      background: #fff;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    .contrato h3 {
      color: #ff6600;
      margin-bottom: 15px;
    }

    .contrato input, .contrato select {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }
  </style>

</head>

<body>

<section>
  <h2 class="section-title">Controle de Contratos</h2>

  <div id="conteudo"></div>
</section>

<script>

// PROTEÇÃO
if (localStorage.getItem("acesso") !== "ok") {
  window.location.href = "intranet.html";
}

// CONTRATOS
const contratos = [
  "Copasa",
  "GHC",
  "Funai Norte Limpeza",
  "Funai Norte Adm",
  "Funai Xingu",
  "Funai Médio Purus",
  "Funai Alto Purus"
];

const container = document.getElementById("conteudo");

contratos.forEach(nome => {
  container.innerHTML += `
    <div class="contrato">
      <h3>${nome}</h3>

      <label>Valor da Nota Fiscal</label>
      <input type="number">

      <label>Status da Nota</label>
      <select>
        <option>Não paga</option>
        <option>Paga</option>
      </select>

      <label>Valor Pago</label>
      <input type="number">

      <label>Folha de Pagamento</label>
      <input type="number">

      <label>VA / VT</label>
      <input type="number">

      <label>FGTS</label>
      <input type="number">
    </div>
  `;
});

</script>

</body>
</html>
